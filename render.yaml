services:
  - type: web
    name: artdb
    runtime: python
    rootDir: app
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python scripts/init_db.py
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false --server.enableCORS=false
    healthCheckPath: /_stcore/health
    domains:
      - artisandb.shop.kg
    disk:
      name: artdb-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.16
      - key: APP_DATA_DIR
        value: /var/data/cache
      - key: APP_UPLOADS_DIR
        value: /var/data/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: artdb-db
          property: connectionString
      - key: STREAMLIT_SERVER_COOKIE_SECRET
        generateValue: true
      - key: APP_PGCRYPTO_KEY
        generateValue: true
      - key: INITIAL_ADMIN_USERNAME
        value: admin
      - key: INITIAL_ADMIN_DISPLAY_NAME
        value: Administrator
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PHONE
        value: ""
      - key: RESET_INITIAL_ADMIN_PASSWORD
        value: "false"

databases:
  - name: artdb-db
    plan: basic-256mb
    databaseName: artdb
    user: artdb_user
