services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: artdb_app
    restart: unless-stopped
    env_file: .env
    environment:
      APP_DATA_DIR: /app/cache
      APP_UPLOADS_DIR: /app/uploads
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Omsk}
      TZ: ${APP_TIMEZONE:-Asia/Omsk}
      STREAMLIT_SERVER_COOKIE_SECRET: ${STREAMLIT_SERVER_COOKIE_SECRET:?STREAMLIT_SERVER_COOKIE_SECRET is required}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - artdb_net
    volumes:
      - ./app/uploads:/app/uploads
      - ./app/cache:/app/cache

  db:
    image: postgres:15-alpine
    container_name: artdb_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${APP_TIMEZONE:-Asia/Omsk}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - artdb_net

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: artdb_nginx
    restart: unless-stopped
    env_file: .env
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-_}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - artdb_net

  certbot:
    image: certbot/certbot:latest
    container_name: artdb_certbot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c
    command: "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet --non-interactive; sleep 12h; done"

  telegram-bot:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: artdb_telegram_bot
    restart: unless-stopped
    working_dir: /app
    command: ["python", "scripts/telegram_notifier.py", "daemon"]
    env_file: .env
    environment:
      APP_DATA_DIR: /app/cache
      APP_UPLOADS_DIR: /app/uploads
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Omsk}
      TZ: ${APP_TIMEZONE:-Asia/Omsk}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - artdb_net
    volumes:
      - ./app/uploads:/app/uploads:ro
      - ./app/cache:/app/cache:ro

  backup:
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
    container_name: artdb_backup
    restart: unless-stopped
    env_file: .env
    environment:
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Omsk}
      TZ: ${APP_TIMEZONE:-Asia/Omsk}
      POSTGRES_HOST: ${DB_HOST:-db}
      POSTGRES_PORT: ${DB_PORT:-5432}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      BACKUP_CRON: ${BACKUP_CRON:-15 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - artdb_net
    volumes:
      - ./app/uploads:/app-data/uploads:ro
      - ./backups:/backups

volumes:
  db_data:

networks:
  artdb_net:
    driver: bridge
